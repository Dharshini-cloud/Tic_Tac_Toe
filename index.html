<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tic-Tac-Toe · Smart AI · Two Modes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- SELECTION SCREEN -->
<div id="selectionScreen" class="selection-screen">
    <div class="selection-card">
        <h2>⚡ TIC-TAC-TOE ⚡</h2>
        <div class="sub">choose your battle</div>
        <div id="selectTwoPlayer" class="mode-option">
            <div class="mode-text">👥 2-PLAYER MODE</div>
        </div>
        <div id="selectVsAI" class="mode-option">
            <div class="mode-text">🤖 VS AI </div>
        </div>
    </div>
</div>

<!-- GAME WRAPPER -->
<div id="gameWrapper" class="game-wrapper">
    <div class="game-container">
        <div class="game-panel">
            <div class="status-area">
                <div class="turn-indicator" id="turnIndicator">
                    <div class="player-card" id="playerXCard">
                        <span class="symbol-icon x-color">X</span>
                        <span>PLAYER X</span>
                    </div>
                    <div class="player-card" id="playerOCard">
                        <span class="symbol-icon o-color">O</span>
                        <span>PLAYER O</span>
                    </div>
                </div><br>
                <div class="status-message" id="statusMsg">✨ Game started · X turn</div>
            </div>

            <div class="tic-grid" id="ticGrid"></div>

            <div class="action-row">
                <button class="btn btn-primary" id="newMatchBtnGame">🔄 NEW MATCH</button>
                <button class="btn btn-warning" id="resetBoardBtn">♻️ RESET BOARD</button>
                <button class="btn" id="exitToMenuBtn">🏠 EXIT / MENU</button>
            </div>
        </div>
    </div>
</div>

<!-- GAME OVER MODAL -->
<div id="gameOverModal" class="game-over-modal">
    <div class="modal-content">
        <h2 id="modalTitle">🏆 GAME OVER</h2>
        <p id="modalMsg" style="font-size: 1.2rem; margin: 12px 0;">Winner: X</p>
        <div class="modal-buttons">
            <div class="modal-btn" id="modalNewMatch">New Match</div>
            <div class="modal-btn exit" id="modalExitMenu">Main Menu</div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
